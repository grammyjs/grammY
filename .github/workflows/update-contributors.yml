name: Update Contributors

on:
    workflow_dispatch: # Manual trigger only

jobs:
    update-contributors:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x

            - name: Check for contributor changes
              id: check
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: deno task update-contribs

            - name: Create Pull Request
              if: steps.check.outputs.changes == 'true'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"
                  git checkout -b auto/update-contributors
                  git add .all-contributorsrc
                  git commit -m "docs: update contributor information"
                  git push -f origin auto/update-contributors
                  gh pr create \
                    --title "chore: update contributor information" \
                    --body "This PR updates contributor information in \`.all-contributorsrc\`.${{ steps.check.outputs.details }}" \
                    --label "dependencies" || \
                  gh pr edit auto/update-contributors \
                    --title "chore: update contributor information" \
                    --body "This PR updates contributor information in \`.all-contributorsrc\`.${{ steps.check.outputs.details }}"
