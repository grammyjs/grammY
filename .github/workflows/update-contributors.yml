name: Update Contributors

on:
    workflow_dispatch:
    schedule:
        - cron: "0 0 1 1,4,7,10 *" # Quarterly: Jan, Apr, Jul, Oct

jobs:
    update-contributors:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x

            - uses: actions/setup-node@v4
              with:
                  node-version: lts/*

            - name: Check for contributor changes
              id: check
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: deno task update-contribs

            - name: Create Pull Request
              if: steps.check.outputs.changes == 'true'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"
                  git switch -c auto/update-contributors
                  git add .all-contributorsrc
                  npx all-contributors-cli generate
                  git add README.md
                  git commit -m "docs: update contributor information"
                  git push -f origin auto/update-contributors
                  printf 'This PR updates contributor information in `.all-contributorsrc` and regenerates the README file.%s' "${{ steps.check.outputs.details }}" > /tmp/pr-body.txt
                  gh pr create \
                    --title "docs: update contributor information" \
                    --body-file /tmp/pr-body.txt || \
                  gh pr edit auto/update-contributors \
                    --title "docs: update contributor information" \
                    --body-file /tmp/pr-body.txt
